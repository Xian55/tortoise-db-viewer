<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tortoise-WoW Database</title>
  <meta name="description" content="Fast item database for Tortoise-WoW" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%A2%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="topbar">
    <a class="brand nav" href="?">🐢 Tortoise DB</a>
    <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
    <nav class="topnav" id="topnav"><!-- mega-menu rendered by src/nav.js --></nav>
    <form id="searchForm" autocomplete="off">
      <input id="search" type="search" placeholder="Search…" aria-label="Search items, NPCs, quests, dungeons" />
      <button type="submit">Search</button>
    </form>
  </header>
  <main id="app"><div class="loading">Loading…</div></main>
  <footer class="sitefoot muted">
    <span id="footUpdated"></span>
    <span id="footLoad"></span>
    <span class="foot-src"><a class="nav-ext" href="https://github.com/Xian55/tortoise-db-viewer" target="_blank" rel="noopener noreferrer">source</a> · <a class="nav-ext" href="https://github.com/Penqle/tortoise-wow" target="_blank" rel="noopener noreferrer">database</a></span>
  </footer>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
