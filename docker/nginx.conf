server {
    listen 80;
    server_name _;

    # App shell built by vite: index.html + hashed /assets/*.js|css|wasm
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    # sqlite-wasm streams its .wasm; make sure it gets the right MIME even if the
    # bundled mime.types is old (streaming compile needs application/wasm).
    location ~ \.wasm$ { default_type application/wasm; }

    # ---- heavy runtime assets, served from the mounted /assets volume --------
    # Populate the volume with the build-db output + committed map/minimap tiles
    # (see docker/README.md). Paths match src/config.js same-origin resolution.
    location /data/    { alias /assets/data/;    }
    location /maps/    { alias /assets/maps/;    }
    location /minimap/ { alias /assets/minimap/; }
    # Optional: per-entity JSON for the embeddable tooltip widget (public/embed).
    # Populate <volume>/tt with `scripts/build-tooltips.mjs` to enable it; absent
    # => the widget degrades gracefully (fetch 404 -> no tooltip). CORS so a
    # third-party page can embed from this host.
    location /tt/ { alias /assets/tt/; add_header Access-Control-Allow-Origin "*"; }

    # SPA: routing is query-param based on a single index.html.
    location / { try_files $uri $uri/ /index.html; }

    # Compress the text-ish assets. The big binaries (webp tiles, the .sqlite)
    # are already compressed or better served precompressed — see note below.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;

    # The DB is ~34 MB raw but compresses well (~10 MB). On-the-fly gzip of it is
    # CPU-heavy per request; instead precompress once and let nginx serve it:
    #   gzip  -9 -k public/data/tortoise.sqlite   ->  tortoise.sqlite.gz
    # then (requires nginx built with gzip_static, which nginx:alpine has):
    #   location = /data/tortoise.sqlite { gzip_static on; }
    # (Brotli would need a brotli-enabled nginx image.)

    # Long-cache the immutable, content-hashed shell assets.
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
}
