name: Deploy dev dataset (1181dev)

# Builds ONLY the dev-dataset DB (server `1181dev` branch) and uploads it to R2
# under the data-dev/ prefix. The site frontend + shared assets (maps/icons/
# minimap/OG/tt) are owned by deploy.yml; the dev app shell (/dev/index.html) ships
# with the main deploy. A new dev DB with a new content hash auto-invalidates the
# client on the next visit, so no Pages redeploy is needed here.
#
# Triggered by watch-dev.yml (hourly, on a 1181dev commit) or manually.

on:
  workflow_dispatch:

permissions:
  contents: write   # push the `cdn-dev` mirror branch + per-version tags

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Checkout server SQL dumps (sparse, 1181dev)
        uses: actions/checkout@v4
        with:
          repository: Penqle/tortoise-wow
          ref: 1181dev
          path: server-dev
          # base data + the incremental world migrations the build applies on top
          sparse-checkout: |
            sql/base
            sql/database_updates
          sparse-checkout-cone-mode: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      # Pull the CURRENTLY-deployed dev DB + changelog from R2 *before* we overwrite
      # them, so build-changelog can diff new-vs-previous. Both are optional (first
      # deploy / wiped bucket) -> the diff falls back to a baseline. The DB object is
      # stored brotli (Content-Encoding: br); aws cp fetches the raw bytes, so we
      # brotli-decompress it here.
      - name: Fetch previous dev DB + changelog from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 cp s3://tortoise-db-viewer/data-dev/tortoise.sqlite prev.sqlite.br \
            --endpoint-url "$R2_ENDPOINT" || echo "no previous dev DB (baseline)"
          if [ -f prev.sqlite.br ]; then
            bun -e 'import {brotliDecompressSync} from "node:zlib"; import {readFileSync,writeFileSync} from "node:fs"; writeFileSync("prev.sqlite", brotliDecompressSync(readFileSync("prev.sqlite.br"))); console.log("prev.sqlite ready");'
          fi
          aws s3 cp s3://tortoise-db-viewer/data-dev/changelog.json changelog-prev.json \
            --endpoint-url "$R2_ENDPOINT" || echo "no previous changelog"
          # main DB -> seed the FIRST changelog section as "dev vs main" so it isn't
          # blank until 1181dev next changes.
          aws s3 cp s3://tortoise-db-viewer/data/tortoise.sqlite main.sqlite.br \
            --endpoint-url "$R2_ENDPOINT" || echo "no main DB (no seed)"
          if [ -f main.sqlite.br ]; then
            bun -e 'import {brotliDecompressSync} from "node:zlib"; import {readFileSync,writeFileSync} from "node:fs"; writeFileSync("main.sqlite", brotliDecompressSync(readFileSync("main.sqlite.br"))); console.log("main.sqlite ready");'
          fi

      - name: Build SQLite database (dev)
        run: bun scripts/build-db.mjs
        env:
          SQL_DIR: ${{ github.workspace }}/server-dev/sql/base
          DATA_SUBDIR: data-dev

      # Diff new-vs-previous shipped DB -> prepend a dated section to changelog.json
      # (served per-dataset at ${DATA_BASE}changelog.json, rendered at ?changelog).
      - name: Generate changelog
        run: |
          DB=public/data-dev/tortoise.sqlite PREV=prev.sqlite SEED=main.sqlite \
            PREV_LOG=changelog-prev.json \
            OUT=public/data-dev/changelog.json VERSION=public/data-dev/version.json \
            bun scripts/build-changelog.mjs

      # Same brotli + R2 layout as the main deploy, retargeted to the data-dev/
      # prefix. The DB is immutable (cache-busted by ?v=); version.json is no-store.
      - name: Upload dev DB to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          bun -e 'import {brotliCompressSync,constants} from "node:zlib"; import {readFileSync,writeFileSync} from "node:fs"; const i=readFileSync("public/data-dev/tortoise.sqlite"); const o=brotliCompressSync(i,{params:{[constants.BROTLI_PARAM_QUALITY]:11,[constants.BROTLI_PARAM_SIZE_HINT]:i.length}}); writeFileSync("public/data-dev/tortoise.sqlite.br",o); console.log("brotli",i.length,"->",o.length);'
          aws s3 cp public/data-dev/tortoise.sqlite.br s3://tortoise-db-viewer/data-dev/tortoise.sqlite \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/octet-stream \
            --content-encoding br
          aws s3 cp public/data-dev/version.json s3://tortoise-db-viewer/data-dev/version.json \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/json --cache-control "no-store"
          # per-deploy changelog (built above); no-store so ?changelog is always fresh
          aws s3 cp public/data-dev/changelog.json s3://tortoise-db-viewer/data-dev/changelog.json \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/json --cache-control "no-store"

      # Mirror the dev DB (+ version.json, changelog.json, icon atlas) to the CDN
      # fallback routes, exactly like the main deploy but on the `cdn-dev` branch /
      # `cdn-dev-v<version>` tags (dataset-isolated). See src/config.js.
      - name: Publish CDN mirror (jsDelivr + raw)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r .version public/data-dev/version.json)
          bun -e 'import {gzipSync} from "node:zlib"; import {readFileSync,writeFileSync,mkdirSync,statSync} from "node:fs"; mkdirSync("cdn/data",{recursive:true}); mkdirSync("cdn/icons",{recursive:true}); const i=readFileSync("public/data-dev/tortoise.sqlite"); writeFileSync("cdn/data/tortoise.sqlite.gz", gzipSync(i,{level:9})); console.log("gzip",i.length,"->",statSync("cdn/data/tortoise.sqlite.gz").size);'
          cp public/data-dev/version.json cdn/data/version.json
          cp public/data-dev/changelog.json cdn/data/changelog.json
          cp public/icons/custom-atlas.webp cdn/icons/custom-atlas.webp
          cp public/icons/custom-atlas.json cdn/icons/custom-atlas.json
          REPO="${{ github.repository }}" CDN_BRANCH="cdn-dev" TAG="cdn-dev-v${VERSION}" \
            PAYLOAD_DIR="cdn" bash scripts/publish-cdn.sh

      - name: Prune old CDN-dev tags (keep newest 3)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --tags --quiet origin || true
          git for-each-ref --sort=-creatordate --format='%(refname:short)' 'refs/tags/cdn-dev-v*' \
            | tail -n +4 | while read -r t; do echo "prune $t"; git push origin --delete "$t" || true; done
