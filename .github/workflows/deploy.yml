name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # push the `cdn` mirror branch + per-version tags
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Checkout server SQL dumps (sparse)
        uses: actions/checkout@v4
        with:
          repository: Penqle/tortoise-wow
          path: server
          # base data + the incremental world migrations the build applies on top
          # (mangosd applies these at runtime; we replicate that so patch-added
          # content -- new zones, NPCs, objects, quests -- shows up).
          sparse-checkout: |
            sql/base
            sql/database_updates
          sparse-checkout-cone-mode: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build SQLite database
        run: bun scripts/build-db.mjs
        env:
          SQL_DIR: ${{ github.workspace }}/server/sql/base

      # Serve the heavy assets (DB, zone maps, icon atlas) from Cloudflare R2 so
      # visitor downloads come off GitHub Pages bandwidth. AWS CLI is preinstalled
      # on ubuntu-latest; R2 speaks the S3 API. Hash-based cache invalidation still
      # works: version.json is no-store, the DB is cache-busted by ?v=.
      - name: Upload assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          # The minimap pyramid is ~2400 tiny files. Bump the AWS CLI's S3
          # parallelism so the (one-time) bulk upload isn't serialized 10-at-a-time.
          aws configure set default.s3.max_concurrent_requests 64
          aws configure set default.s3.max_queue_size 10000
          # DB: immutable (cache-busted by ?v=). Pre-brotli it and store with
          # Content-Encoding: br so the browser fetch() transparently decompresses
          # (~73 MB -> ~13 MB on the wire; OPFS still caches the full DB). Same
          # object key, so the client URL is unchanged. Compress via Bun's
          # node:zlib (already installed -- no apt dependency).
          bun -e 'import {brotliCompressSync,constants} from "node:zlib"; import {readFileSync,writeFileSync} from "node:fs"; const i=readFileSync("public/data/tortoise.sqlite"); const o=brotliCompressSync(i,{params:{[constants.BROTLI_PARAM_QUALITY]:11,[constants.BROTLI_PARAM_SIZE_HINT]:i.length}}); writeFileSync("public/data/tortoise.sqlite.br",o); console.log("brotli",i.length,"->",o.length);'
          aws s3 cp public/data/tortoise.sqlite.br s3://tortoise-db-viewer/data/tortoise.sqlite \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/octet-stream \
            --content-encoding br
          # version pointer: must never cache (drives cache invalidation)
          aws s3 cp public/data/version.json s3://tortoise-db-viewer/data/version.json \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/json --cache-control "no-store"
          # maps: all .webp
          aws s3 sync public/maps s3://tortoise-db-viewer/maps \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type image/webp --delete
          # seamless world-map tile pyramid (committed; CI can't rebuild it -- no
          # client): ~2400 .webp. --size-only: a fresh git checkout re-stamps every
          # file's mtime, so the default size+mtime compare would re-upload ALL tiles
          # every deploy; compare by size alone -> only changed tiles upload (a
          # re-extracted tile virtually always differs in byte size). --no-progress
          # keeps the log readable.
          aws s3 sync public/minimap s3://tortoise-db-viewer/minimap \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type image/webp --size-only --no-progress \
            --cache-control "public,max-age=31536000,immutable" --delete
          # icons: webp sprites first (exclude the manifest)...
          aws s3 sync public/icons s3://tortoise-db-viewer/icons \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude "*.json" --content-type image/webp --delete
          # ...then the atlas manifest as JSON (NOT image/webp)
          aws s3 sync public/icons s3://tortoise-db-viewer/icons \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude "*" --include "*.json" --content-type application/json

      # Extra DB delivery routes for networks where R2 is blocked or throttled: the
      # brotli DB copy (built above for R2, ~15 MB) + version.json + icon atlas pushed
      # to an orphan `cdn` branch (raw.githubusercontent, CORS-open) and an immutable
      # per-version tag (jsDelivr, 20 MB file limit). src/config.js races these when R2
      # is unreachable and db-worker.js decodes the brotli client-side (brotli-wasm).
      - name: Publish CDN mirror (jsDelivr + raw)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r .version public/data/version.json)
          mkdir -p cdn/data cdn/icons
          cp public/data/tortoise.sqlite.br cdn/data/tortoise.sqlite.br
          cp public/data/version.json cdn/data/version.json
          cp public/icons/custom-atlas.webp cdn/icons/custom-atlas.webp
          cp public/icons/custom-atlas.json cdn/icons/custom-atlas.json
          REPO="${{ github.repository }}" CDN_BRANCH="cdn" TAG="cdn-v${VERSION}" \
            PAYLOAD_DIR="cdn" bash scripts/publish-cdn.sh

      - name: Prune old CDN tags (keep newest 3)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --tags --quiet origin || true
          git for-each-ref --sort=-creatordate --format='%(refname:short)' 'refs/tags/cdn-v*' \
            | tail -n +4 | while read -r t; do echo "prune $t"; git push origin --delete "$t" || true; done

      # Asset origin: set the repo variable ASSET_BASE_URL (Settings -> Secrets and
      # variables -> Actions -> Variables) to an R2 custom domain, e.g.
      # https://cdn.tortoiseclothing.org (NO trailing slash), to move off the
      # rate-limited pub-*.r2.dev URL. Unset -> falls back to the r2.dev public URL,
      # so this is safe to leave until the custom domain's SSL is Active.
      - name: Build site
        run: bunx --bun vite build
        env:
          VITE_DATA_BASE: ${{ vars.ASSET_BASE_URL || 'https://pub-aedb97cad2314db2a24aed17421e1254.r2.dev' }}/data/
          # Dev-dataset DB (server 1181dev branch), served at the /dev/ path. The
          # bundle picks this base when location is under /dev/ (src/config.js).
          VITE_DATA_BASE_DEV: ${{ vars.ASSET_BASE_URL || 'https://pub-aedb97cad2314db2a24aed17421e1254.r2.dev' }}/data-dev/
          # Vanilla/cMaNGOS dataset, served at /vanilla/cmangos/ (built by deploy-cmangos.yml).
          VITE_DATA_BASE_VANILLA_CMANGOS: ${{ vars.ASSET_BASE_URL || 'https://pub-aedb97cad2314db2a24aed17421e1254.r2.dev' }}/data-vanilla-cmangos/
          VITE_ASSETS_BASE: ${{ vars.ASSET_BASE_URL || 'https://pub-aedb97cad2314db2a24aed17421e1254.r2.dev' }}/
          # repo slug for the jsDelivr/raw mirror URLs (src/config.js)
          VITE_GH_REPO: ${{ github.repository }}
          # public JSON API origin (src/config.js API_BASE); override via repo var API_BASE_URL
          VITE_API_BASE: ${{ vars.API_BASE_URL || 'https://api.tortoiseclothing.org' }}

      # The dev dataset is served at /dev/. Query-param routing means the only path
      # we must serve is dev/index.html (deep URLs are /dev/?item=...). It's a copy
      # of the app shell -- the JS/CSS it references are base-absolute, so both share
      # the same R2-served bundle; the bundle reads the /dev/ path to pick the dev DB.
      - name: Emit /dev app shell
        run: mkdir -p dist/dev && cp dist/index.html dist/dev/index.html

      # Same as /dev: the /vanilla/cmangos dataset (deploy-cmangos.yml populates its R2
      # DB) only needs its app-shell path served; query routing handles the rest.
      - name: Emit /vanilla/cmangos app shell
        run: mkdir -p dist/vanilla/cmangos && cp dist/index.html dist/vanilla/cmangos/index.html

      # Per-icon custom webp for link-unfurl og:image. Turtle-custom icons aren't on
      # Blizzard's CDN and ship only as the packed atlas sprite, which can't be an
      # og:image; the individual committed files (assets/icons/custom) are served
      # from the site so build-og.mjs can point custom items/spells at them.
      - name: Copy custom icons for OG embeds
        run: cp -r assets/icons/custom dist/icons/custom

      # Per-entity Open Graph "stub" pages so pasted links (Discord/Twitter/Slack)
      # unfurl with the real title/description instead of index.html's generic meta
      # (crawlers don't run JS, and a static host can't vary a file by ?quest=N).
      # The stubs are a pure function of the built DB, so gate generation on a content
      # hash: a code-only deploy (DB unchanged) restores them from cache in seconds
      # instead of regenerating tens of thousands of files. They still ship in the
      # artifact either way -- the cache only skips the CPU of regenerating.
      - name: OG stub content hash
        id: oghash
        run: echo "hash=$(HASH_ONLY=1 bun scripts/build-og.mjs)" >> "$GITHUB_OUTPUT"

      - name: Restore prerendered OG stubs
        id: ogcache
        uses: actions/cache@v4
        with:
          path: og-stubs
          key: og-${{ steps.oghash.outputs.hash }}

      - name: Prerender OG stubs (cache miss only)
        if: steps.ogcache.outputs.cache-hit != 'true'
        run: OUT_DIR=og-stubs bun scripts/build-og.mjs

      - name: Merge OG stubs into the site
        run: cp -r og-stubs/. dist/

      # Compact per-entity JSON for the embeddable powered-tooltip widget
      # (public/embed/tw-power.js). Same content-hash cache gate as the OG stubs:
      # a code-only deploy (DB unchanged) restores them instead of regenerating.
      - name: Tooltip JSON content hash
        id: tthash
        run: echo "hash=$(HASH_ONLY=1 bun scripts/build-tooltips.mjs)" >> "$GITHUB_OUTPUT"

      - name: Restore tooltip JSON
        id: ttcache
        uses: actions/cache@v4
        with:
          path: tt-json
          key: tt-${{ steps.tthash.outputs.hash }}

      - name: Build tooltip JSON (cache miss only)
        if: steps.ttcache.outputs.cache-hit != 'true'
        run: OUT_DIR=tt-json bun scripts/build-tooltips.mjs

      # Serve the tooltip JSON from R2, NOT the Pages artifact. There are ~74k of
      # these tiny per-entity files; bundling them (on top of the ~95k OG stubs)
      # pushed the artifact past ~170k files, which GitHub Pages' deploy file-sync
      # ("syncing_files") consistently fails on. The embed widget (tw-power.js)
      # fetches them from R2 by default. --size-only so a fresh checkout's re-stamped
      # mtimes don't re-upload every file each deploy.
      - name: Upload tooltip JSON to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          # Hash-gate: build-tooltips writes tt/manifest.json {count,hash,version}.
          # Compare the local hash against the one already on R2 (read via the S3 API,
          # NOT the cached public URL, so it's authoritative) and skip the 74k-file
          # sync when tt is unchanged. Self-healing: a missing/differing R2 manifest
          # (first run, wiped bucket) falls through to a full sync.
          LOCAL_HASH=$(jq -r .hash tt-json/tt/manifest.json 2>/dev/null || echo "")
          R2_HASH=$(aws s3 cp s3://tortoise-db-viewer/tt/manifest.json - \
            --endpoint-url "$R2_ENDPOINT" 2>/dev/null | jq -r .hash 2>/dev/null || echo "")
          if [ -n "$LOCAL_HASH" ] && [ "$LOCAL_HASH" = "$R2_HASH" ]; then
            echo "tt unchanged (hash=$LOCAL_HASH) -- skipping R2 sync"
            exit 0
          fi
          echo "tt changed (local=$LOCAL_HASH r2=${R2_HASH:-none}) -- syncing to R2"
          aws configure set default.s3.max_concurrent_requests 64
          aws configure set default.s3.max_queue_size 10000
          aws s3 sync tt-json/tt s3://tortoise-db-viewer/tt \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/json --size-only --no-progress \
            --cache-control "public,max-age=86400" --delete

      # Wowhead-style JSON API (scripts/build-api.mjs): richer per-entity JSON (full
      # page data + rendered tooltipHtml) served from R2 at api.tortoiseclothing.org.
      # Cache gate + R2 hash-gate so a code-only deploy restores from cache and skips
      # the ~100k-file R2 sync. R2-only (never merged into dist -- would break Pages'
      # syncing_files like tt).
      #
      # Cache key is an INPUT hash (the DB content hash in version.json + the files that
      # determine the API output), NOT the rendered-output hash. HASH_ONLY=1 still renders
      # every entity to hash its output, which cost ~8.7 min -- as long as the actual build
      # (~8.8 min), so we paid the generation TWICE on a data change. hashFiles() is instant
      # and, since the API output is a pure function of the DB + these modules, it invalidates
      # exactly when the output can change. The R2 hash-gate below still compares the real
      # OUTPUT digest from the (cache-restored) manifest.json, so publishing stays precise.
      - name: Restore API JSON
        id: apicache
        uses: actions/cache@v4
        with:
          path: api-json
          key: api-${{ hashFiles('public/data/version.json', 'scripts/build-api.mjs', 'src/queries.js', 'src/render.js', 'src/constants.js') }}

      - name: Build API JSON (cache miss only)
        if: steps.apicache.outputs.cache-hit != 'true'
        run: OUT_DIR=api-json bun scripts/build-api.mjs

      - name: Upload API JSON to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          # Hash-gate against the authoritative R2 manifest (S3 API, not the CDN) so an
          # unchanged API skips the big sync. Self-healing on a missing R2 manifest.
          LOCAL_HASH=$(jq -r .hash api-json/api/manifest.json 2>/dev/null || echo "")
          R2_HASH=$(aws s3 cp s3://tortoise-db-viewer/api/manifest.json - \
            --endpoint-url "$R2_ENDPOINT" 2>/dev/null | jq -r .hash 2>/dev/null || echo "")
          if [ -n "$LOCAL_HASH" ] && [ "$LOCAL_HASH" = "$R2_HASH" ]; then
            echo "api unchanged (hash=$LOCAL_HASH) -- skipping R2 sync"
            exit 0
          fi
          echo "api changed (local=$LOCAL_HASH r2=${R2_HASH:-none}) -- syncing to R2"
          aws configure set default.s3.max_concurrent_requests 64
          aws configure set default.s3.max_queue_size 10000
          aws s3 sync api-json/api s3://tortoise-db-viewer/api \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/json --size-only --no-progress \
            --cache-control "public,max-age=86400" --delete

      # The DB, zone maps and minimap tiles are all served from R2 (VITE_ASSETS_BASE)
      # in production, but Vite copies public/ into dist -- so they'd ship redundantly
      # in the Pages artifact (~75 MB DB + ~13 MB brotli + ~2700 tile files). Drop them
      # so the artifact is just the site shell + OG stubs.
      - name: Trim R2-served assets from the Pages artifact
        run: rm -rf dist/data/tortoise.sqlite dist/data/tortoise.sqlite.br dist/maps dist/minimap

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://xian55.github.io/tortoise-db-viewer/
    steps:
      # GitHub Pages' deploy file sync ("syncing_files") is flaky for large sites --
      # this one ships ~95k OG-unfurl stub files, and Pages returns a terminal
      # "Deployment failed, try again later" on roughly half of attempts (the SAME
      # artifact deploys fine on a retry: e8b4fec succeeded, 9e5d23d failed on an
      # identical stub set). Retry up to 5×, spaced to skip transient backend
      # hiccups. Each tN is gated on the previous attempt failing, so the chain stops
      # at the first success; the final attempt has no continue-on-error, so if every
      # attempt fails the job fails. Each attempt just re-syncs the uploaded artifact.
      - id: t1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.t1.outcome == 'failure'
        run: sleep 20
      - id: t2
        if: steps.t1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.t2.outcome == 'failure'
        run: sleep 40
      - id: t3
        if: steps.t2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.t3.outcome == 'failure'
        run: sleep 60
      - id: t4
        if: steps.t3.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.t4.outcome == 'failure'
        run: sleep 90
      - id: t5
        if: steps.t4.outcome == 'failure'
        uses: actions/deploy-pages@v4
