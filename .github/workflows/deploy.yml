name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Checkout server SQL dumps (sparse)
        uses: actions/checkout@v4
        with:
          repository: Penqle/tortoise-wow
          path: server
          sparse-checkout: sql/base
          sparse-checkout-cone-mode: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build SQLite database
        run: bun scripts/build-db.mjs
        env:
          SQL_DIR: ${{ github.workspace }}/server/sql/base

      - name: Build site
        run: bunx --bun vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
